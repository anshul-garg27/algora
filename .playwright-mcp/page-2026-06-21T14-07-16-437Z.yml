            - heading "3.3 🎙️ Spoken intro" [level=3] [ref=e350]
            - blockquote [ref=e351]:
              - text: 💬 "So the model has six objects.
              - code [ref=e352]: ParkingLotService
              - text: is the brain — it owns the floors and a map of open tickets, keyed by spot id so unpark is O(1) on the spot.
              - code [ref=e353]: ParkingSpot
              - text: "is the interesting one: it remembers its own physical state and carries its own lock — it's the only thing allowed to flip itself occupied or free, and to take a spot you lock that one spot."
              - code [ref=e354]: SpotAllocationStrategy
              - text: is the seam — the lot asks it which spot, so the policy is swappable.
              - code [ref=e355]: Vehicle
              - text: and
              - code [ref=e356]: Ticket
              - text: are immutable records — plain data. The pieces I deliberately left OUT are Fee, which is just a number computed at exit, and Driver/Gate/Payment, which live outside our boundary."
