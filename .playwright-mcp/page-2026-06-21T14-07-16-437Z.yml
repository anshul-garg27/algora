            - blockquote [ref=e1688]:
              - strong [ref=e1689]: "Why the sequence shows the design is good:"
              - text: the service coordinates but implements no business logic — selection delegates to the strategy and the status change delegates to the spot's state machine. That's Open/Closed and Information Expert at runtime.
