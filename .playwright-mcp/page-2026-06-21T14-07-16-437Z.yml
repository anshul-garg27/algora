              - code [ref=e1474]: "public long unpark(String ticketId) { if (ticketId == null) { throw new TicketNotFoundException(\"ticketId must not be null\"); } Ticket ticket = findOpenTicketById(ticketId); if (ticket == null) { throw new TicketNotFoundException(\"no open ticket with id \" + ticketId); } ParkingSpot spot = findSpotById(ticket.spotId()); withSpotGuard(spot, () -> { spot.release(); // OCCUPIED -> FREE (idempotent) openTickets.remove(spot.id()); // so the same ticket can't unpark twice return null; }); return computeFee(ticket.entryTime(), clock.get()); }"
            - paragraph [ref=e1475]:
              - strong [ref=e1476]: "5. Reasoning:"
              - code [ref=e1477]: unpark
              - text: is two guards then a release-and-bill. The
              - code [ref=e1478]: spot.release()
              - text: is idempotent, so a real unpark racing a future cleanup sweep is safe — whoever runs first frees the spot, the second call does nothing. I
              - code [ref=e1479]: remove
              - text: from the registry inside the same guard so the same ticket id can never be unparked twice. The fee is computed
              - emphasis [ref=e1480]: outside
              - text: the guard from the injected clock — releasing the spot has nothing to do with reading the entry time, so I don't hold the lock during billing.
            - blockquote [ref=e1481]: "🎙️ Say: \"Look up the ticket, free the spot, drop it from the registry, then bill. Release is idempotent so a double-free is harmless.\""
