            - heading "9. Concurrency, Thread-Safety, Edge Cases & Extensibility" [level=2] [ref=e1691]
            - paragraph [ref=e1692]:
              - strong [ref=e1693]: "DEFAULT: describe verbally. Write code only if asked."
            - paragraph [ref=e1694]:
              - text: 🗣️
              - strong [ref=e1695]: "Step 1 — Name the exact race:"
              - text: "\"The race is in"
              - code [ref=e1696]: park
              - text: . Two cars call it at the same time. The strategy hands both the same free spot, L1-1. Both pass the
              - code [ref=e1697]: isFree
              - text: re-check, both call
              - code [ref=e1698]: occupy
              - text: ", both succeed — two cars on one spot, and one ticket overwrites the other in the registry. That's a check-then-act race: the check ("
              - code [ref=e1699]: isFree
              - text: ) and the act (
              - code [ref=e1700]: occupy
              - text: ) aren't one atomic step."
            - paragraph [ref=e1701]:
              - text: 🗣️
              - strong [ref=e1702]: "Step 2 — Solution:"
              - text: "\"Each"
              - code [ref=e1703]: ParkingSpot
              - text: carries its own
              - code [ref=e1704]: ReentrantLock
              - text: . Before the check-and-occupy, the thread takes
              - emphasis [ref=e1705]: that spot's
              - text: lock. While it holds the lock, no other thread can enter for that spot. After occupy, it releases. Two cars racing for L1-1 now race for L1-1's lock — one wins, the other waits, then its re-check sees OCCUPIED, releases L1-1's lock, and the retry loop (which sits
              - emphasis [ref=e1706]: outside
              - text: the lock) re-runs the strategy and takes the next-best spot. Because the retry is outside the guard, the loser is never holding L1-1's lock while reaching for L1-2's — one lock at a time, no deadlock."
            - paragraph [ref=e1707]:
              - text: 🗣️
              - strong [ref=e1708]: "Step 3 — Trade-off:"
              - text: "\"I chose"
              - emphasis [ref=e1709]: per-spot
              - text: locks, not one global lock. A global lock is correct but serializes the whole building — one car parking blocks every other car. Per-spot locks let a hundred cars park into a hundred different spots fully in parallel; only two cars fighting for the
              - emphasis [ref=e1710]: same
              - text: spot ever serialize, and that's microseconds."
            - paragraph [ref=e1711]:
              - text: 🗣️
              - strong [ref=e1712]: "Step 4 — Distributed:"
              - text: "\"For multiple servers, an in-process lock only protects one JVM. I'd push atomicity to the database with a compare-and-set:"
              - code [ref=e1713]: UPDATE spot SET status='OCCUPIED' WHERE id=? AND status='FREE'
              - text: . Whoever's update affects 0 rows lost the race and retries or gets a clean error."
