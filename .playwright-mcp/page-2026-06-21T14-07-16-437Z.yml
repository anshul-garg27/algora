            - heading "D. Tricky Logic" [level=3] [ref=e1091]
            - blockquote [ref=e1092]:
              - strong [ref=e1093]: "🧠 Claim:"
              - code [ref=e1094]: park
              - text: must re-check the spot is free
              - emphasis [ref=e1095]: inside
              - text: the guard, not trust the strategy's answer.
            - blockquote [ref=e1096]:
              - strong [ref=e1097]: "🔬 Proof:"
              - text: Thread A's
              - code [ref=e1098]: findSpot
              - text: returns L1-1. Before A occupies it, thread B (which also got L1-1) occupies it. If A blindly occupies, two cars share L1-1.
            - blockquote [ref=e1099]:
              - strong [ref=e1100]: "🛠️ Fix in code:"
              - text: the re-check in
              - code [ref=e1101]: park
              - text: —
              - code [ref=e1102]: if (!candidate.isFree()) return null;
              - text: inside the guard — returns a sentinel so the loop
              - emphasis [ref=e1103]: outside
              - text: the guard retries, finding the next-best spot. The retry runs after the guard released candidate's lock, so a thread never holds two spot locks at once.
            - blockquote [ref=e1104]:
              - strong [ref=e1105]: "🧠 Claim:"
              - code [ref=e1106]: ParkingSpot.release()
              - text: must be idempotent.
            - blockquote [ref=e1107]:
              - strong [ref=e1108]: "🔬 Proof:"
              - text: A real unpark and a future stale-ticket sweep can both decide a spot is done; whoever runs second would hit "illegal FREE→FREE" and wrongly error on the legitimate path.
            - blockquote [ref=e1109]:
              - strong [ref=e1110]: "🛠️ Fix in code:"
              - code [ref=e1111]: release()
              - text: only flips when
              - code [ref=e1112]: status == OCCUPIED
              - text: ; otherwise it returns silently.
            - blockquote [ref=e1113]:
              - strong [ref=e1114]: "🧠 Claim:"
              - text: A regular car must never take a handicapped spot, and vice-versa.
            - blockquote [ref=e1115]:
              - strong [ref=e1116]: "🔬 Proof:"
              - text: Pure rank comparison (
              - code [ref=e1117]: spot.rank >= vehicle.minRank
              - text: ) would let a CAR grab a HANDICAPPED spot if HANDICAPPED had a high rank, or block handicapped vehicles if it had a low rank.
            - blockquote [ref=e1118]:
              - strong [ref=e1119]: "🛠️ Fix in code:"
              - code [ref=e1120]: VehicleType.fits
              - text: special-cases HANDICAPPED with exact two-way equality before falling back to the rank test.
