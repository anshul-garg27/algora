            - heading "1. Understanding the Problem & Clarifying Questions" [level=2] [ref=e128]
            - heading "1.1 What we're building (plain words)" [level=3] [ref=e129]
            - blockquote [ref=e130]:
              - text: 💬 "We're building the brain of a parking garage that lives in memory. Cars, motorcycles, and handicapped vehicles drive up; the system finds them the best free spot across multiple floors, hands back a ticket, and when they leave it frees the spot and charges them for how long they stayed. The two hard parts are picking the
              - emphasis [ref=e131]: right
              - text: spot — smallest one that fits, nearest floor — and making sure two cars arriving at the exact same second never get handed the same spot."
            - heading "1.2 Clarifying questions (candidate-led proposals)" [level=3] [ref=e132]
            - paragraph [ref=e133]:
              - strong [ref=e134]: "You:"
              - text: "\"For v1 I'll assume a single in-memory lot in one process — no database, no multi-region. The whole thing is one JVM. Sound right?\""
              - strong [ref=e135]: "Interviewer:"
              - text: "\"Yep, in-memory is the scope.\""
              - emphasis [ref=e136]: "✓ scoped: one process, in-memory state — distributed is a §9 'if we scaled' note."
            - paragraph [ref=e137]:
              - strong [ref=e138]: "You:"
              - text: "\"Spot sizes: I'll model compact, large, and handicapped. A motorcycle fits a compact or larger, a car needs at least a large, and a handicapped vehicle needs a handicapped spot — and a regular car must NOT be allowed to take a handicapped spot. OK?\""
              - strong [ref=e139]: "Interviewer:"
              - text: "\"Agreed — and yes, protect the handicapped spots.\""
              - emphasis [ref=e140]: "✓ locked: handicapped is a reserved category matched by exact equality, not by size ranking."
            - paragraph [ref=e141]:
              - strong [ref=e142]: "You:"
              - text: "\"Allocation policy: I'll do best-fit — smallest spot that still fits — breaking ties by nearest floor. I'll make that a pluggable strategy so we can swap to 'cheapest first' or 'random' later without touching core code. Reasonable?\""
              - strong [ref=e143]: "Interviewer:"
              - text: "\"Love it, make it pluggable.\""
              - emphasis [ref=e144]: ✓ Strategy seam is in scope — this is the design's smart move.
            - paragraph [ref=e145]:
              - strong [ref=e146]: "You:"
              - text: "\"Billing: charge by time, per started hour, rounding partial hours up, with a one-hour minimum. I'll keep money in cents to avoid float bugs. Fine?\""
              - strong [ref=e147]: "Interviewer:"
              - text: "\"Sounds good. Flat hourly rate is fine for now.\""
              - emphasis [ref=e148]: "✓ scoped: flat rate, round up, cents. Tiered/peak pricing is a future strategy."
            - paragraph [ref=e149]:
              - strong [ref=e150]: "You:"
              - text: "\"Concurrency is the meat: many cars park and unpark at once. I'll keep the core single-threaded-clean and then show a thread-safe version using a per-spot lock so two cars never double-book one spot. I'll prove it with a 50-thread race test. That's the deliverable you care about?\""
              - strong [ref=e151]: "Interviewer:"
              - text: "\"Exactly — show me no double-allocation under contention.\""
              - emphasis [ref=e152]: ✓ the concurrency angle is per-spot fine-grained locks; the race test is the proof.
            - paragraph [ref=e153]:
              - strong [ref=e154]: "You:"
              - text: "\"I'll treat the physical gate hardware, license-plate OCR, and payment processing as out of scope — we just return a fee amount. OK?\""
              - strong [ref=e155]: "Interviewer:"
              - text: "\"Agreed, out of scope.\""
              - emphasis [ref=e156]: "✓ system boundary: we compute the fee, we don't move money or open gates."
            - heading "1.3 Final Requirements (the whiteboard summary)" [level=3] [ref=e157]
