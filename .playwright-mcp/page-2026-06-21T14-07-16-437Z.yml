            - heading "5.5 Core Algorithms & Approach" [level=2] [ref=e937]
            - heading "A. The Key Insight" [level=3] [ref=e938]
            - blockquote [ref=e939]:
              - strong [ref=e940]: "Insight:"
              - text: Make each
              - code [ref=e941]: ParkingSpot
              - text: a self-guarding state machine that
              - emphasis [ref=e942]: carries its own lock
              - text: ", and make spot selection a swappable Strategy. To park, lock the one spot you're taking, re-check it's free, occupy it."
            - blockquote [ref=e943]:
              - strong [ref=e944]: Why it works
              - text: "\"Which spot is best\" is a pure policy with no shared state — it factors cleanly into a Strategy. And \"is this spot taken\" is intrinsic to the spot, so the spot can guard its own FREE→OCCUPIED transition. Because the lock lives"
              - emphasis [ref=e945]: on the spot
              - text: ", two cars taking two different spots take two different locks and never block each other. The only contention is two cars fighting for the"
              - emphasis [ref=e946]: same
              - text: spot, and the lock plus re-check makes one win cleanly and the other go find another spot.
            - blockquote [ref=e947]:
              - strong [ref=e948]: "What breaks without it:"
              - text: The naive version inlines
              - code [ref=e949]: spot.status = OCCUPIED
              - text: in the service after a bare
              - code [ref=e950]: findSpot
              - text: . Under load, two threads both see spot L1-1 free (check-then-act), both write OCCUPIED, and two cars are assigned one spot — one ticket silently overwrites the other in the registry. By making the spot guard its own transition
              - emphasis [ref=e951]: and
              - text: requiring its own lock for the write, that bug is impossible by construction.
            - heading "B. Per-Operation Algorithm" [level=3] [ref=e952]
            - heading "park(vehicle)" [level=4] [ref=e953]:
              - code [ref=e954]: park(vehicle)
            - paragraph [ref=e955]:
              - strong [ref=e956]: (1) Pseudocode
            - generic [ref=e957]:
              - button "copy" [ref=e959] [cursor=pointer]
              - code [ref=e961]: "1. if vehicle is null -> throw ParkingException 2. loop: # retry loop lives OUTSIDE the guard 3. candidate = strategy.findSpot(floors, vehicle.type) 4. if candidate is empty -> throw NoSpotAvailableException 5. ticket = withSpotGuard(candidate): # no-op in core; per-spot lock in subclass 6. if candidate is NOT free: # re-check inside the guard 7. return null # taken meanwhile; sentinel -> retry 8. candidate.occupy(vehicle) # FREE -> OCCUPIED, guarded by the spot 9. return new Ticket(nextId, candidate.id, vehicle, clock.now) 10. # guard has now RELEASED candidate's lock 11. if ticket is not null: 12. openTickets[candidate.id] = ticket 13. return ticket 14. # else: loop and try the next-best spot, holding NO lock across the retry"
            - blockquote [ref=e962]:
              - text: 🎙️
              - strong [ref=e963]: "Walkthrough (race-prone method):"
              - text: "\"This method has the check-then-act race —"
              - code [ref=e964]: findSpot
              - text: checks,
              - code [ref=e965]: occupy
              - text: "acts, and steps 6-9 are the critical section. Step 3 is where the Strategy fires — the service doesn't know it's best-fit. Step 6 is the non-obvious one: I re-check"
              - emphasis [ref=e966]: inside
              - text: the guard, because the strategy's answer is a hint that may be stale by the time I hold the lock. If the spot got taken, the guard returns a
              - code [ref=e967]: "null"
              - text: sentinel and the loop retries — but crucially the loop is
              - emphasis [ref=e968]: outside
              - text: the guard, so candidate's lock is already released before I re-run the strategy and take the next spot's lock. That's what keeps a thread holding at most ONE spot lock at a time. In §9 the guard becomes a real per-spot lock, and steps 6-9 become atomic."
