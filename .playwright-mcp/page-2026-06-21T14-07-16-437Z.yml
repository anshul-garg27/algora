            - blockquote [ref=e1013]:
              - emphasis [ref=e1014]:
                - text: "Edge probe: what if a second car calls"
                - code [ref=e1015]: park
                - text: while step 8 is mid-flight?
              - text: "Without a lock both see L1-1 free at step 6 → both occupy → double-allocation. §9 fixes it: the per-spot lock serializes step 6-9, so the loser's re-check at step 6 sees OCCUPIED, the guard returns the"
