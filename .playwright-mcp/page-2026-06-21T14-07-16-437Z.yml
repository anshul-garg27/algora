            - list [ref=e569]:
              - listitem [ref=e570]:
                - strong [ref=e571]:
                  - text: Why does the spot own its lock instead of the service holding a
                  - code [ref=e572]: Map<spotId, Lock>
                  - text: "?"
                - text: Co-locating the lock with the thing it guards means there's no separate map to keep in sync and no "lock the map before the lock" dance. The lock's lifetime is exactly the spot's lifetime.
              - listitem [ref=e573]:
                - strong [ref=e574]:
                  - text: Why is
                  - code [ref=e575]: occupy
                  - text: guarded but
                  - code [ref=e576]: release
                  - text: idempotent?
                - text: Occupying an occupied spot is a real bug (two cars on one spot) — it must throw. Releasing a free spot is a harmless double-free (a real unpark racing a future cleanup sweep) — it must be a silent no-op.
