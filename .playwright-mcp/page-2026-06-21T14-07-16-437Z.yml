              - code [ref=e1444]: "public Ticket park(Vehicle vehicle) { if (vehicle == null) { throw new ParkingException(\"vehicle must not be null\"); } while (true) { // retry loop OUTSIDE the guard ParkingSpot candidate = strategy.findSpot(floors, vehicle.type()) .orElseThrow(() -> new NoSpotAvailableException( \"no free spot for vehicle type \" + vehicle.type())); Ticket ticket = withSpotGuard(candidate, () -> { if (!candidate.isFree()) { // WHY: re-check inside the guard return null; // taken meanwhile -> sentinel, retry } candidate.occupy(vehicle); // FREE -> OCCUPIED, guarded by the spot return new Ticket(nextTicketId(), candidate.id(), vehicle, clock.get()); }); // guard has released candidate's lock here — no lock held across the retry if (ticket != null) { openTickets.put(candidate.id(), ticket); return ticket; } // else: candidate was taken; loop and try the next-best spot } }"
            - paragraph [ref=e1445]:
              - strong [ref=e1446]: "5. Reasoning:"
              - code [ref=e1447]: park
              - text: is the pipeline. The interesting line is the re-check
              - code [ref=e1448]: if (!candidate.isFree()) return null;
              - text: — the strategy's answer is only a
              - emphasis [ref=e1449]: hint
              - text: that can go stale between selection and the moment we hold the guard, so I look again under the lock and, if the spot's gone, I return a sentinel and the loop
              - emphasis [ref=e1450]: outside
              - text: the guard retries, which finds the next-best spot. The retry deliberately lives outside
              - code [ref=e1451]: withSpotGuard
              - text: ": by the time we loop, candidate's lock is already released, so a thread holds at most ONE spot lock at a time and never grabs a second while holding the first — there's no lock-ordering cycle and so no deadlock by construction. Notice I'm"
              - emphasis [ref=e1452]: not
              - text: validating the vehicle type inside
              - code [ref=e1453]: park
              - text: — that's the strategy's job, which simply returns no spot for an incompatible vehicle. In the clean core
              - code [ref=e1454]: withSpotGuard
              - text: is a no-op, so this reads as straight-line code; the only thing that changes for thread safety is that the guard becomes a real per-spot lock. The
              - code [ref=e1455]: occupy
              - text: call goes through the spot's own state machine rather than a direct status write, so even if the lock were somehow removed, an illegal double-occupy throws instead of silently overwriting a car.
            - blockquote [ref=e1456]: "🎙️ Say: \"Strategy picks a spot, then inside the guard I re-check it's free and occupy it. The re-check is what beats the race — the spot might've been taken since I looked. If it was, the guard hands back a null and my loop retries with a fresh strategy pick — and I've already let go of that spot's lock before retrying.\""
            - blockquote [ref=e1457]:
              - text: ⚠️ "What if two cars get the same spot from the strategy?" → "Inside the guard I re-check
              - code [ref=e1458]: isFree
              - text: . The loser sees OCCUPIED, the guard returns null, releasing the loser's lock, and the loop picks the next-best spot. With the per-spot lock in §9, only one car is ever inside the guard for that spot at a time, and no thread ever holds two spot locks at once."
