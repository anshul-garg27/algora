              - strong [ref=e1020]: (1) Pseudocode
            - generic [ref=e1021]:
              - button "copy" [ref=e1023] [cursor=pointer]
              - code [ref=e1025]: "1. if ticketId is null -> throw TicketNotFoundException 2. ticket = findOpenTicketById(ticketId) 3. if ticket is null -> throw TicketNotFoundException 4. spot = findSpotById(ticket.spotId) 5. withSpotGuard(spot): 6. spot.release() # OCCUPIED -> FREE (idempotent) 7. openTickets.remove(spot.id) # drop registry entry 8. return computeFee(ticket.entryTime, clock.now)"
