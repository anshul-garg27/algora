              - code [ref=e1491]: "private String nextTicketId() { return \"tkt-\" + ticketCounter.incrementAndGet(); // readable, thread-safe ids } private Ticket findOpenTicketById(String ticketId) { for (Ticket t : openTickets.values()) { // small set: only parked cars if (t.id().equals(ticketId)) return t; } return null; } private ParkingSpot findSpotById(String spotId) { for (ParkingFloor floor : floors) { for (ParkingSpot spot : floor.spots()) { if (spot.id().equals(spotId)) return spot; } } throw new TicketNotFoundException(\"ticket points at unknown spot \" + spotId); } private long computeFee(Instant entry, Instant exit) { long minutes = Math.max(0, Duration.between(entry, exit).toMinutes()); long hours = (minutes + 59) / 60; // round up partial hours if (hours == 0) hours = 1; // one-hour minimum return hours * ratePerHourCents; // cents, no float }"
