              - code [ref=e1362]: "package com.interview.lld.parking.model; import java.util.concurrent.locks.ReentrantLock; import javax.annotation.Nullable; public class ParkingSpot { private final String id; private final int floorNumber; private final SpotSize size; private SpotStatus status; @Nullable private Vehicle vehicle; private final ReentrantLock lock = new ReentrantLock(); // per-spot lock public ParkingSpot(String id, int floorNumber, SpotSize size) { this.id = id; this.floorNumber = floorNumber; this.size = size; this.status = SpotStatus.FREE; this.vehicle = null; } public String id() { return id; } public int floorNumber() { return floorNumber; } public SpotSize size() { return size; } public SpotStatus status() { return status; } public boolean isFree() { return status == SpotStatus.FREE; } @Nullable public Vehicle vehicle() { return vehicle; } public ReentrantLock lock() { return lock; } public void occupy(Vehicle v) { // WHY: guard the transition — a non-free spot cannot be occupied again. if (status != SpotStatus.FREE) { throw new InvalidSpotStateException(\"spot \" + id + \" is not FREE, cannot occupy\"); } this.status = SpotStatus.OCCUPIED; this.vehicle = v; } public void release() { // WHY: idempotent — releasing a free spot is a safe no-op. if (status == SpotStatus.OCCUPIED) { this.status = SpotStatus.FREE; this.vehicle = null; } } }"
