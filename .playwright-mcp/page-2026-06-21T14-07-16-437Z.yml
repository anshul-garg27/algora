            - blockquote [ref=e1146]:
              - strong [ref=e1147]: "Why it's wrong:"
              - text: two failure modes. (1) The direct status write bypasses the spot's state machine — illegal transitions become possible. (2) The find-then-write is check-then-act — under concurrency two callers both see the same spot free and both occupy it. The correct version delegates selection to a Strategy, calls
