              - code [ref=e1378]: "package com.interview.lld.parking.strategy; import java.util.Comparator; import java.util.List; import java.util.Optional; import com.interview.lld.parking.model.*; public class BestFitNearestStrategy implements SpotAllocationStrategy { // smallest fitting size, then nearest floor, then id (deterministic) private static final Comparator<ParkingSpot> BEST_FIRST = Comparator.comparingInt((ParkingSpot s) -> s.size().rank()) .thenComparingInt(ParkingSpot::floorNumber) .thenComparing(ParkingSpot::id); @Override public Optional<ParkingSpot> findSpot(List<ParkingFloor> floors, VehicleType type) { return floors.stream() .flatMap(f -> f.spots().stream()) .filter(ParkingSpot::isFree) .filter(s -> type.fits(s.size())) .min(BEST_FIRST); } }"
