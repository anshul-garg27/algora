            - heading "5.1 Information Expert (the foundational principle)" [level=3] [ref=e867]
            - blockquote [ref=e868]:
              - text: "💬 \"I followed Information Expert: each class owns the state and behavior closest to the data it has."
              - code [ref=e869]: ParkingLotService
              - text: owns allocation coordination and the open-ticket registry because it's the only thing that sees all floors and all tickets.
              - code [ref=e870]: ParkingSpot
              - text: owns its occupancy and its lock because physical presence — 'is there a car in me right now' — is intrinsic to the spot, not relational to the system.
              - code [ref=e871]: VehicleType
              - text: owns the
              - code [ref=e872]: fits
              - text: rule because compatibility is intrinsic to the vehicle's kind. So nobody reaches across boundaries to mutate state they don't own."
