            - paragraph [ref=e1780]:
              - strong [ref=e1781]: Concurrency follow-up Q&A
            - blockquote [ref=e1782]: ❓ "Why per-spot locks and not one global lock?"
            - blockquote [ref=e1783]: "\"A global lock serializes every park in the building through one bottleneck even though different spots share no state. Per-spot locks let cars going to different spots run fully parallel; only same-spot contenders serialize, microseconds each.\""
            - blockquote [ref=e1784]:
              - text: ❓ "Why
              - code [ref=e1785]: ReentrantLock
              - text: and not a plain non-reentrant lock?"
            - blockquote [ref=e1786]: "\"If a guarded method ever calls another guarded method on the same spot, a non-reentrant lock would deadlock on the second acquire by the same thread. Reentrant lets the owning thread re-enter and only fully releases at the outermost unlock. Today my call graph holds exactly one spot lock at a time — the retry loop sits outside the guard, so the lock is released before the next attempt — but reentrant is the safe default and costs nothing.\""
            - blockquote [ref=e1787]: ❓ "What's the deadlock risk?"
            - blockquote [ref=e1788]:
              - text: "\"Deadlock needs two locks acquired in different orders. Here a"
              - code [ref=e1789]: park
              - text: holds exactly ONE spot lock and never grabs a second while holding it — the strategy scan happens
              - emphasis [ref=e1790]: before
              - text: the lock, billing happens
              - emphasis [ref=e1791]: after
              - text: ", and the retry loop is"
              - emphasis [ref=e1792]: outside
              - text: the guard, so when a re-check fails the guard returns a sentinel and releases that spot's lock
              - emphasis [ref=e1793]: before
              - text: the loop picks and locks the next-best spot. A thread is therefore never holding spot A's lock while reaching for spot B's, so no lock-ordering cycle can form. No cycle, no deadlock."
            - blockquote [ref=e1794]: ❓ "Why is the strategy scan outside the lock?"
            - blockquote [ref=e1795]: "\"The scan only reads spot status; it's a hint. Holding a lock across a scan of every spot would serialize the whole lot. I scan lock-free, then take just the one candidate spot's lock and re-check under it — so the expensive part is parallel and only the tiny check-and-occupy is serialized.\""
            - blockquote [ref=e1796]: ❓ "Pessimistic or optimistic — which and why?"
            - blockquote [ref=e1797]: "\"Pessimistic in-process: the critical section is tiny (a re-check and a status flip) and same-spot contention is rare, so a short-held lock is simpler than a retry loop. For the distributed case I flip to optimistic — a DB compare-and-set — because you can't hold a JVM lock across servers.\""
            - blockquote [ref=e1798]: ❓ "What if the lock-holder thread crashes mid-critical-section?"
            - blockquote [ref=e1799]: "\"In-process, a crash takes the JVM down, so the half-done state dies with it — no orphaned lock. In the DB version the compare-and-set is one atomic statement: it either fully committed or didn't.\""
