              - text: and I assert peak concurrency there is exactly 1; and a transaction-atomicity test where two customers buy different products concurrently and each still gets its own product and change. The first two fail if the lock is removed; the third fails if locking is per-call instead of per-transaction."
            - blockquote [ref=e1964]: ❓ "What if you had 10,000 machines?"
            - blockquote [ref=e1965]: "\"Each machine is its own process/object with its own lock — they share no memory, so there's no contention between machines by design. Inventory and sales would go to a per-machine row in a DB; a central dashboard reads aggregates. The in-process lock scales fine because it only ever guards one machine.\""
