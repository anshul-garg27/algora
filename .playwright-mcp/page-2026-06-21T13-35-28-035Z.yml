            - heading "9. Concurrency, Thread-Safety, Edge Cases & Extensibility" [level=2] [ref=e1692]
            - paragraph [ref=e1693]:
              - strong [ref=e1694]: "DEFAULT: describe verbally. Write code only if asked."
            - paragraph [ref=e1695]:
              - text: 🗣️
              - strong [ref=e1696]: "Step 1 — Name the race:"
              - text: "\"In"
              - code [ref=e1697]: dispense
              - text: ", two button-press threads on the same machine both re-check 'gum in stock', both see qty 1, both call"
              - code [ref=e1698]: vend_one
              - text: ". Stock goes to -1 — double-dispense. It's a check-then-act race: the stock check and the decrement aren't one atomic step. The same threads also stomp on the shared inserted-coins list and the state pointer.\""
            - paragraph [ref=e1699]:
              - text: 🗣️
              - strong [ref=e1700]: "Step 2 — The solution:"
              - text: "\"I guard the"
              - emphasis [ref=e1701]: whole transaction
              - text: with one reentrant lock on the machine — and that's a transaction
              - emphasis [ref=e1702]: boundary
              - text: ", not per-call locking. Locking each method on its own isn't enough: between one customer's insert and their dispense, a second customer could slip a coin into the same shared"
              - code [ref=e1703]: _inserted
              - text: list and corrupt both. So the caller wraps the whole flow in
              - code [ref=e1704]: "with svc.transaction():"
              - text: ", which holds the machine lock from the first insert through dispense (or cancel). The per-method lock re-enters the same"
              - code [ref=e1705]: RLock
              - text: harmlessly. Only one customer's full transaction runs at a time."
            - paragraph [ref=e1706]:
              - text: 🗣️
              - strong [ref=e1707]: "Step 3 — The trade-off:"
              - text: "\"On a single machine this is exactly right — there's no per-slot parallelism to win because every action shares the same inserted-coins tally and the same coin bank. The machine itself is the unit of mutual exclusion. A finer lock would be pure complexity for zero throughput gain.\""
            - paragraph [ref=e1708]:
              - text: 🗣️
              - strong [ref=e1709]: "Step 4 — Distributed (if asked):"
              - text: "\"A fleet of machines would each run their own process and their own lock — no shared memory, so no cross-machine contention by design. If they shared a central inventory you'd push atomicity to the DB:"
              - code [ref=e1710]: UPDATE slot SET qty = qty - 1 WHERE code = ? AND qty > 0
              - text: — a compare-and-set; whoever's update affects 0 rows lost and gets OutOfStock."
