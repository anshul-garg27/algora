              - text: "(every action illegal):"
            - generic [ref=e1406]:
              - generic [ref=e1407]:
                - generic [ref=e1408]: python
                - button "copy" [ref=e1409] [cursor=pointer]
              - code [ref=e1411]: "def cancel(self, ctx: VendingContext) -> tuple[MachineState, tuple[Coin, ...]]: refund = tuple(ctx.inserted) ctx.inserted.clear() ctx.selected_code = None return IdleState(), refund class DispensingState(MachineState): name = MachineStateName.DISPENSING def insert_coin(self, ctx, coin): raise InvalidStateError(\"busy dispensing — please wait\") def select(self, ctx, code): raise InvalidStateError(\"busy dispensing — please wait\") def dispense(self, ctx): raise InvalidStateError(\"busy dispensing — please wait\") def cancel(self, ctx): raise InvalidStateError(\"cannot cancel while dispensing\")"
            - heading "The orchestrator skeleton (vending_service.py)" [level=3] [ref=e1412]:
              - text: The orchestrator skeleton (
              - code [ref=e1413]: vending_service.py
              - text: )
            - complementary [ref=e1414]:
              - generic [ref=e1415]: 🎙️ Script — say this
              - generic [ref=e1416]:
                - text: "Open:"
                - emphasis [ref=e1417]: "\"Here's the brain — it just holds working memory and routes each action to the current state.\""
            - generic [ref=e1418]:
              - generic [ref=e1419]:
                - generic [ref=e1420]: python
                - button "copy" [ref=e1421] [cursor=pointer]
              - code [ref=e1423]: "class VendingService(VendingContext): def __init__(self, slots: dict[str, Slot], coin_bank: CoinBank) -> None: self._slots = slots self._coin_bank = coin_bank self._inserted: list[Coin] = [] self._selected_code: str | None = None self._state: MachineState = IdleState() # boots in IDLE def insert_coin(self, coin: Coin) -> int: ... def select_product(self, code: str) -> None: ... def dispense(self) -> DispenseResult: ... def cancel(self) -> tuple[Coin, ...]: ... def refill(self, code: str, units: int) -> None: ... @contextmanager def _lock(self) -> Iterator[None]: yield # no-op; subclass overrides @contextmanager def transaction(self) -> Iterator[\"VendingService\"]: # The REAL unit of atomicity. A caller wraps its whole flow so the lock # (no-op here, a real RLock in the subclass) is held across the entire # insert -> select -> dispense, not re-acquired per call. with self._lock(): yield self"
            - paragraph [ref=e1424]:
              - text: The
              - code [ref=e1425]: transaction()
              - text: boundary is the crux of the concurrency design. Insert, select, and dispense all mutate the SAME shared working memory (
              - code [ref=e1426]: _inserted
              - text: ","
              - code [ref=e1427]: _selected_code
              - text: ","
              - code [ref=e1428]: _state
              - text: ). Locking each method individually is
              - strong [ref=e1429]: not
              - text: enough — between one customer's insert and dispense, a second customer could slip a coin into the same shared
              - code [ref=e1430]: _inserted
              - text: "list and walk off with the first customer's money as \"change.\" So the caller wraps the whole interaction:"
            - generic [ref=e1431]:
              - generic [ref=e1432]:
                - generic [ref=e1433]: python
                - button "copy" [ref=e1434] [cursor=pointer]
              - code [ref=e1436]: "with svc.transaction() as machine: machine.insert_coin(Coin.DOLLAR) machine.select_product(\"A1\") result = machine.dispense()"
            - paragraph [ref=e1437]:
              - text: In the clean core
              - code [ref=e1438]: transaction()
              - text: acquires the no-op
              - code [ref=e1439]: _lock
              - text: once; the thread-safe subclass holds one reentrant machine lock for the whole block — one customer's full transaction at a time. The per-method
              - code [ref=e1440]: _lock()
              - text: inside re-enters that same
              - code [ref=e1441]: RLock
              - text: harmlessly.
            - paragraph [ref=e1442]: "Now the public methods — each just wraps the (no-op) lock and forwards to the current state, adopting whatever state it returns:"
            - generic [ref=e1443]:
              - generic [ref=e1444]:
                - generic [ref=e1445]: python
                - button "copy" [ref=e1446] [cursor=pointer]
              - code [ref=e1448]: "def insert_coin(self, coin: Coin) -> int: with self._lock(): self._state = self._state.insert_coin(self, coin) return self.inserted_cents() def select_product(self, code: str) -> None: with self._lock(): self._state = self._state.select(self, code) def dispense(self) -> DispenseResult: with self._lock(): self._state, result = self._state.dispense(self) return result def cancel(self) -> tuple[Coin, ...]: with self._lock(): self._state, refund = self._state.cancel(self) return refund"
            - blockquote [ref=e1449]:
