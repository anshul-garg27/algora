              - listitem [ref=e815]:
                - strong [ref=e816]: "🎙️ Script:"
                - text: "\"The machine is a finite state machine. The service forwards each action to the current state object and adopts whatever state it hands back. Illegal transitions — dispensing while idle — are impossible because"
