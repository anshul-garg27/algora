            - generic [ref=e1678]: "sequenceDiagram actor Customer participant Svc as VendingService participant State as HasMoneyState participant Bank as CoinBank participant Slot Customer->>Svc: open transaction (acquire machine lock once) Note over Customer,Svc: lock held across the whole insert select dispense flow Customer->>Svc: dispense() Svc->>Svc: _lock re-enters the same RLock (no-op in core) Svc->>State: dispense(ctx) State->>Slot: is_in_stock and price Slot-->>State: in stock, price 75 State->>State: check paid 100 is at least 75 State->>Bank: deposit_many(inserted coins) State->>Bank: make_change(25) Bank-->>State: returns one quarter State->>Slot: vend_one() Slot-->>State: quantity 3 becomes 2 State-->>Svc: return IdleState and DispenseResult Svc->>Svc: store IdleState Svc-->>Customer: Cola plus 25c change Customer->>Svc: close transaction (release machine lock)"
            - blockquote [ref=e1679]:
              - text: 🎙️
              - strong [ref=e1680]: "Walk it arrow by arrow:"
              - text: "\"The customer opens a"
              - code [ref=e1681]: transaction
              - text: ", which acquires the machine lock once and holds it across the whole flow — so no second customer can interleave. Then"
              - code [ref=e1682]: dispense
              - text: re-enters that same reentrant lock and forwards to the current state,
              - code [ref=e1683]: HasMoneyState
              - text: . The state asks the
              - code [ref=e1684]: Slot
              - text: for stock and price, checks the paid amount covers it, then deposits the customer's coins into the
              - code [ref=e1685]: CoinBank
              - text: and asks it for exact change. The interesting moment is
              - code [ref=e1686]: make_change
              - text: returning a quarter — that's the all-or-nothing change. Then
              - code [ref=e1687]: vend_one
              - text: on the slot is the atomic decrement that guards the race. The state hands back
              - code [ref=e1688]: IdleState
              - text: plus the result; the service stores the new state and returns the product. The lock only releases when the transaction closes."
