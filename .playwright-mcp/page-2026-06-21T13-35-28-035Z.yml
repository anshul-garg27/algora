            - blockquote [ref=e881]:
              - strong [ref=e882]: Why it works
              - text: "A vending machine has a small, ordered set of legal phases and the legal actions differ sharply per phase. That structure maps exactly onto the State pattern: the phase object IS the source of truth for \"what can happen next.\" And because a customer can insert coins and change their selection between checking and dispensing, the only safe place to validate is at dispense time — so dispense re-reads stock, funds, and change together and only mutates if all pass."
