            - heading "1. Understanding the Problem & Clarifying Questions" [level=2] [ref=e133]
            - heading "1.1 What we're building (plain words)" [level=3] [ref=e134]
            - blockquote [ref=e135]: "💬 \"So we're modelling a physical vending machine. A customer drops coins in one at a time, picks a product by its slot code, and the machine drops the product and any change. If they bail, they hit cancel and get their coins back. The whole thing is a little state machine — it's idle, then it's collecting money, then it's dispensing — and it has to reject the obvious bad cases: a slot that doesn't exist, not enough money, or a sold-out slot. It's one physical machine, so only one person uses it at a time.\""
            - heading "1.2 Clarifying questions (candidate-led)" [level=3] [ref=e136]
            - paragraph [ref=e137]:
              - strong [ref=e138]: "You:"
              - text: "\"I'll model the coin set as a fixed list — penny, nickel, dime, quarter, dollar — and prices in whole cents so there's no floating-point mess. Sound right?\""
              - strong [ref=e139]: "Interviewer:"
              - text: "\"Yep, cents and that coin set is fine.\""
              - emphasis [ref=e140]: "✓ scoped: integer cents, US coin denominations — change-making is plain integer arithmetic."
            - paragraph [ref=e141]:
              - strong [ref=e142]: "You:"
              - text: "\"The lifecycle is IDLE → COLLECTING_MONEY → DISPENSING and back to IDLE. I'd let the customer either pre-select a product and then pay, or pay first and then select — both end in the same place. OK to support both orders?\""
              - strong [ref=e143]: "Interviewer:"
              - text: "\"Sure, support both.\""
              - emphasis [ref=e144]: ✓ select works from IDLE and from COLLECTING_MONEY; dispense is only legal once money + selection are both present.
            - paragraph [ref=e145]:
              - strong [ref=e146]: "You:"
              - text: "\"For change: the machine has its own coin bank, and if it physically can't form the exact change owed, I'll reject the sale with a typed error and keep the customer's money fully refundable — never dispense and short-change them. Agreed?\""
              - strong [ref=e147]: "Interviewer:"
              - text: "\"Agreed — that's the right failure mode.\""
              - emphasis [ref=e148]: ✓ make-change is all-or-nothing; a sale that can't make change does not vend.
            - paragraph [ref=e149]:
              - strong [ref=e150]: "You:"
              - text: "\"I'll treat the physical hardware — motors, the actual coin mechanism, the door sensor — as out of scope. The dispense is synchronous in my model. OK?\""
              - strong [ref=e151]: "Interviewer:"
              - text: "\"Yes, keep it in-memory.\""
              - emphasis [ref=e152]: ✓ DISPENSING is modelled as a real state but the vend completes synchronously; no hardware layer.
            - paragraph [ref=e153]:
              - strong [ref=e154]: "You:"
              - text: "\"Last one — it's a single machine, so 'thread-safe' here means concurrent button presses on the SAME machine must not corrupt the state machine or double-dispense. Not a fleet of machines. Right?\""
              - strong [ref=e155]: "Interviewer:"
              - text: "\"Correct — single machine, but make the concurrency real.\""
              - emphasis [ref=e156]: ✓ one machine = one unit of contention; the whole transaction is the critical section.
            - heading "1.3 Final Requirements (the whiteboard summary)" [level=3] [ref=e157]
