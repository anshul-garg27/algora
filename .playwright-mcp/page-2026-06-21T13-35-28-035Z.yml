            - blockquote [ref=e1962]:
              - text: "\"Two threads buying the last unit, and — the subtler one — two customers cross-contaminating each other's money on the shared machine. I prove it with three tests: a 40-buyer last-unit race where each inserts a DIFFERENT coin mix and I assert per-buyer refunds and machine-wide money conservation; a serialization test where stock == N so every thread reaches"
