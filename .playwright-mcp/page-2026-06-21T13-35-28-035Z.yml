                - code [ref=e2051]: "# Python 3.11+ \"\"\" models.py — the \"nouns\" of the vending machine, plus the State pattern. The single most important idea in this file: The machine is a FINITE STATE MACHINE. Instead of one big if/else on a `status` string scattered across the service, each machine state is its own small class (Idle, HasMoney, Dispensing). Each state class answers exactly ONE question: \"in this state, what does insert_coin / select / dispense / cancel do, and what state do we move to next?\" 🎙️ \"I model the machine as a state machine with one class per state. The service never asks &#39;what status am I in?' — it just forwards the button press to the current state object, and the state decides the next state. Illegal transitions (e.g. dispense before selecting) become impossible by construction — the Idle state simply has no legal &#39;dispense'.\" \"\"\" from abc import ABC, abstractmethod from collections.abc import Callable from dataclasses import dataclass, field from enum import Enum # ── WHY THIS ENUM ──────────────────────────────────────────────────────────── # Coins are a FIXED, finite set of denominations. Using an IntEnum lets the # change-making algorithm sort and subtract denominations like plain ints. # 🎙️ \"Coins are an IntEnum keyed by cents, so 'make change' is just arithmetic.\" class Coin(Enum): PENNY = 1 NICKEL = 5 DIME = 10 QUARTER = 25 DOLLAR = 100 @property def cents(self) -> int: return self.value # ── WHY THIS ENUM ──────────────────────────────────────────────────────────── # A label the diagram and tests can read; the real behaviour lives in the State # classes below. We expose a `name` only so logs/tests can assert \"we're IDLE\". class MachineStateName(Enum): IDLE = \"IDLE\" COLLECTING_MONEY = \"COLLECTING_MONEY\" DISPENSING = \"DISPENSING\" # ── WHY ONE BASE EXCEPTION ─────────────────────────────────────────────────── # One domain base (VendingError) so callers can `except VendingError` to catch # anything this machine throws, and one specific subclass per failure mode so # tests and UIs can branch on the exact reason. We NEVER raise bare Exception. class VendingError(Exception): \"\"\"Base class for every error this vending machine raises.\"\"\" class InvalidSelectionError(VendingError): \"\"\"The selected slot code does not exist on this machine.\"\"\" class OutOfStockError(VendingError): \"\"\"The selected product exists but has zero units left.\"\"\" class InsufficientFundsError(VendingError): \"\"\"The customer asked to dispense but has not inserted enough money.\"\"\" class CannotMakeChangeError(VendingError): \"\"\"We owe change but the coin bank cannot form the exact amount.\"\"\" class InvalidStateError(VendingError): \"\"\"An operation was attempted that the current state does not allow.\"\"\" # ── WHY THIS VALUE OBJECT ──────────────────────────────────────────────────── # A Product is a catalog fact: a code, a name, a price. It NEVER changes after # the machine is loaded, so it is frozen — Python stops any accidental write. # 🎙️ \"Product is frozen: once the machine is stocked, its price and name are # fixed. Stock count is NOT here — that changes, so it lives on the Slot.\" @dataclass(frozen=True) class Product: code: str # id — the slot code the customer keys in, e.g. \"A1\" name: str price_cents: int # ── WHY THIS ENTITY ────────────────────────────────────────────────────────── # A Slot is the physical shelf position: it holds ONE product type and a count. # It owns its OWN stock transitions (vend / refill) so the rule \"never go below # zero\" lives in one place, not smeared across the service. @dataclass class Slot: product: Product quantity: int # WHY: an injectable seam (defaults to a no-op). Tests set this to a tiny # time.sleep so the gap between the \"is there stock?\" check and the # \"take one\" decrement is WIDE — that's the exact window two unlocked # threads would both slip through. It is the moral equivalent of the # injected Clock: it makes a timing-dependent race reproducible instead # of relying on luck. In production this stays None (zero cost). pre_vend_hook: \"Callable[[], None] | None\" = None def is_in_stock(self) -> bool: return self.quantity > 0 def vend_one(self) -> None: # WHY: the slot guards its own invariant. If two code paths both tried # to dispense the last unit, this raise is the backstop that makes # \"stock can never go negative\" true by construction, not by hope. if self.quantity <= 0: raise OutOfStockError(f\"slot {self.product.code} is empty\") if self.pre_vend_hook is not None: # WHY: widen the check-then-act window so an UNLOCKED machine really # races (two threads both pass the check above, both decrement). # Under the real lock this hook runs while holding the lock, so # no second thread can be inside vend_one at the same time. self.pre_vend_hook() self.quantity -= 1 def refill(self, units: int) -> None: if units <= 0: raise InvalidSelectionError(\"refill units must be positive\") self.quantity += units # ── WHY THIS VALUE OBJECT ──────────────────────────────────────────────────── # The result of a successful purchase: which product came out, and the exact # coins returned as change. Frozen because a completed sale is history — nothing # may rewrite it. main.py and tests assert against this. @dataclass(frozen=True) class DispenseResult: product: Product change: tuple[Coin, ...] @property def change_cents(self) -> int: return sum(c.cents for c in self.change) # ── WHY THIS ENTITY ────────────────────────────────────────────────────────── # The CoinBank is the machine's wallet. It holds the float (coins available to # GIVE as change) and accepts inserted coins. Make-change asks it for an exact # combination; if it cannot form the amount it says so, and the bank is left # untouched (all-or-nothing). # 🎙️ \"The bank owns the coin inventory. Crucially, make_change is all-or-nothing # — it computes the full combination first and only deducts if it succeeds, # so a failed change attempt never leaves the bank short a few dimes.\" @dataclass class CoinBank: # inventory: how many of each denomination we currently hold to give back. inventory: dict[Coin, int] = field(default_factory=dict) def deposit(self, coin: Coin, count: int = 1) -> None: self.inventory[coin] = self.inventory.get(coin, 0) + count def deposit_many(self, coins: tuple[Coin, ...]) -> None: # WHY: when a customer's coins are accepted into the machine they become # part of the float we can hand back to the NEXT customer. for coin in coins: self.deposit(coin) def make_change(self, amount_cents: int) -> tuple[Coin, ...]: # WHY: greedy from the largest denomination down is OPTIMAL for the US # coin set (1,5,10,25,100) — each larger coin is a multiple-friendly # step, so greedy never paints itself into a corner here. # WHY: we build the result in a scratch copy and only commit to the real # inventory at the very end. If we run out of coins mid-way we raise # and the bank is unchanged — all-or-nothing, no partial deduction. if amount_cents < 0: raise CannotMakeChangeError(\"cannot make negative change\") remaining = amount_cents plan: dict[Coin, int] = {} for coin in sorted(Coin, key=lambda c: c.cents, reverse=True): if remaining <= 0: break available = self.inventory.get(coin, 0) needed = remaining // coin.cents take = min(needed, available) if take > 0: plan[coin] = take remaining -= take * coin.cents if remaining != 0: # WHY: we could not form the EXACT amount from what we hold. raise CannotMakeChangeError( f\"cannot make exact change for {amount_cents} cents\" ) # Commit the plan — only now do we touch the real inventory. for coin, take in plan.items(): self.inventory[coin] -= take # Expand the plan into a flat tuple of coins, biggest first. change: list[Coin] = [] for coin, take in plan.items(): change.extend([coin] * take) return tuple(change) # ═══════════════════════════════════════════════════════════════════════════ # THE STATE PATTERN — one class per machine state # ═══════════════════════════════════════════════════════════════════════════ # Each State knows how to handle the four customer actions. The METHODS return # the NEXT state (and, for dispense, also a DispenseResult). The service holds a # `current_state` reference and replaces it with whatever the state returns. # # Why a class per state instead of an if/else on a string? # - Illegal actions are impossible by construction: IdleState.dispense() just # raises, because there's nothing selected. No \"if status == DISPENSING and # also no selection\" bug can sneak in. # - Adding a new state (e.g. OUT_OF_SERVICE) is a new class, not edits to five # scattered if-branches. class MachineState(ABC): \"\"\"One vending-machine state. Handles the four actions, returns next state.\"\"\" name: MachineStateName @abstractmethod def insert_coin(self, ctx: \"VendingContext\", coin: Coin) -> \"MachineState\": ... @abstractmethod def select(self, ctx: \"VendingContext\", code: str) -> \"MachineState\": ... @abstractmethod def dispense( self, ctx: \"VendingContext\" ) -> tuple[\"MachineState\", DispenseResult]: ... @abstractmethod def cancel(self, ctx: \"VendingContext\") -> tuple[\"MachineState\", tuple[Coin, ...]]: ... # A tiny protocol the states use to read/mutate the machine's working memory # (the coins inserted so far, the chosen slot, the catalog, the bank). Keeping # this on a context object means the State classes stay pure behaviour and the # service owns the data. class VendingContext(ABC): @property @abstractmethod def slots(self) -> dict[str, Slot]: ... @property @abstractmethod def coin_bank(self) -> CoinBank: ... @property @abstractmethod def inserted(self) -> list[Coin]: ... @property @abstractmethod def selected_code(self) -> str | None: ... @selected_code.setter @abstractmethod def selected_code(self, value: str | None) -> None: ... def inserted_cents(self) -> int: return sum(c.cents for c in self.inserted) class IdleState(MachineState): \"\"\"IDLE — nothing inserted, nothing selected. Waiting for a customer.\"\"\" name = MachineStateName.IDLE def insert_coin(self, ctx: VendingContext, coin: Coin) -> MachineState: # WHY: the first coin moves us from IDLE into COLLECTING_MONEY. We add # the coin to the running tally and hand control to HasMoneyState. ctx.inserted.append(coin) return HasMoneyState() def select(self, ctx: VendingContext, code: str) -> MachineState: # WHY: you can pre-select before paying (common on real machines). We # validate the code exists and is in stock, remember it, but stay # collecting money until enough is in. _validate_selectable(ctx, code) ctx.selected_code = code return HasMoneyState() def dispense( self, ctx: VendingContext ) -> tuple[MachineState, DispenseResult]: # WHY: nothing selected, no money in — dispensing makes no sense here. raise InvalidStateError(\"cannot dispense while idle — insert coins first\") def cancel(self, ctx: VendingContext) -> tuple[MachineState, tuple[Coin, ...]]: # WHY: cancel while idle is harmless — nothing to refund, stay idle. return self, () class HasMoneyState(MachineState): \"\"\"COLLECTING_MONEY — coins inserted and/or a product selected, not yet vended.\"\"\" name = MachineStateName.COLLECTING_MONEY def insert_coin(self, ctx: VendingContext, coin: Coin) -> MachineState: ctx.inserted.append(coin) return self def select(self, ctx: VendingContext, code: str) -> MachineState: # WHY: customer (re)picks a product. Validate then remember it. Re-select # is fine — it just overwrites the previous choice. _validate_selectable(ctx, code) ctx.selected_code = code return self def dispense( self, ctx: VendingContext ) -> tuple[MachineState, DispenseResult]: # WHY: this is the heart of the machine. We re-validate everything at the # moment of truth: a product is selected, still in stock, funds are # enough, and we can form exact change. Only if ALL hold do we move # to DISPENSING and actually vend. Any failure raises a typed error # and leaves us in COLLECTING_MONEY (money still refundable). code = ctx.selected_code if code is None: raise InvalidStateError(\"no product selected — select before dispensing\") slot = _validate_selectable(ctx, code) price = slot.product.price_cents paid = ctx.inserted_cents() if paid < price: raise InsufficientFundsError( f\"product {code} costs {price}, only {paid} inserted\" ) # Compute change BEFORE committing anything. make_change is all-or-nothing, # so if we can't form the change the bank is untouched and we raise here — # the customer's money is still fully refundable via cancel(). # First fold the customer's coins into the bank so they're available as # change too, then ask for the change owed. ctx.coin_bank.deposit_many(tuple(ctx.inserted)) change_owed = paid - price try: change = ctx.coin_bank.make_change(change_owed) except CannotMakeChangeError: # WHY: roll the customer's coins back OUT of the bank so cancel can # refund them — we never keep money for a sale we couldn't finish. _rollback_inserted(ctx) raise # Commit the vend: the slot guards its own count (never negative). slot.vend_one() result = DispenseResult(product=slot.product, change=change) # Reset working memory: the sale is done. ctx.inserted.clear() ctx.selected_code = None # WHY: we briefly pass through DISPENSING then settle back to IDLE. We # return IdleState because the transaction has fully completed. return IdleState(), result def cancel(self, ctx: VendingContext) -> tuple[MachineState, tuple[Coin, ...]]: # WHY: refund every coin the customer put in, drop any selection, go IDLE. refund = tuple(ctx.inserted) ctx.inserted.clear() ctx.selected_code = None return IdleState(), refund class DispensingState(MachineState): \"\"\"DISPENSING — a transient state while the product physically drops. In this single-customer, in-memory model the vend completes synchronously inside HasMoneyState.dispense, so the machine never actually *parks* here. We model the state explicitly (it&#39;s in the problem's IDLE → COLLECTING_MONEY → DISPENSING lifecycle) and make every action illegal: while a product is physically dropping, no new coins, selections, or cancels are accepted. \"\"\" name = MachineStateName.DISPENSING def insert_coin(self, ctx: VendingContext, coin: Coin) -> MachineState: raise InvalidStateError(\"busy dispensing — please wait\") def select(self, ctx: VendingContext, code: str) -> MachineState: raise InvalidStateError(\"busy dispensing — please wait\") def dispense( self, ctx: VendingContext ) -> tuple[MachineState, DispenseResult]: raise InvalidStateError(\"busy dispensing — please wait\") def cancel(self, ctx: VendingContext) -> tuple[MachineState, tuple[Coin, ...]]: # WHY: you cannot cancel a sale once the product is dropping — too late. raise InvalidStateError(\"cannot cancel while dispensing\") # ── shared guards used by several states ───────────────────────────────────── def _validate_selectable(ctx: VendingContext, code: str) -> Slot: # WHY: one place decides \"is this a thing I can sell right now?\" — used by # both select() and dispense() so the rules can never drift apart. slot = ctx.slots.get(code) if slot is None: raise InvalidSelectionError(f\"no such product code: {code}\") if not slot.is_in_stock(): raise OutOfStockError(f\"product {code} is out of stock\") return slot def _rollback_inserted(ctx: VendingContext) -> None: # WHY: undo the deposit_many we did when computing change, coin for coin, so # a failed change attempt leaves the bank exactly as it started. for coin in ctx.inserted: # The coin must be present (we just deposited it), but guard anyway. if ctx.coin_bank.inventory.get(coin, 0) > 0: ctx.coin_bank.inventory[coin] -= 1"
