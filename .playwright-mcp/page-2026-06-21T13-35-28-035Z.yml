              - code [ref=e798]: CoinBank
              - text: owns the float and the make-change algorithm because it's the only thing that knows what coins exist. And each
              - code [ref=e799]: MachineState
              - text: owns the rules for its own phase —
              - code [ref=e800]: Idle
              - text: knows you can't dispense yet,
              - code [ref=e801]: Dispensing
              - text: knows you can't cancel mid-drop."
            - heading "5.2 Applied patterns" [level=3] [ref=e802]
            - paragraph [ref=e803]:
