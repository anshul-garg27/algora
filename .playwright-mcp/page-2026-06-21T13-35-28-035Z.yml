            - paragraph [ref=e1774]:
              - strong [ref=e1775]: Concurrency Follow-up Q&A
            - blockquote [ref=e1776]:
              - text: ❓ "Why
              - code [ref=e1777]: RLock
              - text: and not a plain
              - code [ref=e1778]: Lock
              - text: "?\""
            - blockquote [ref=e1779]:
              - text: "\"Because a guarded public method can call another path that the same thread also runs under the lock. A plain"
              - code [ref=e1780]: Lock
              - text: would deadlock on the second acquire by the same thread; an
              - code [ref=e1781]: RLock
              - text: lets the owning thread re-enter and only fully releases when the outermost
              - code [ref=e1782]: with
              - text: exits."
            - blockquote [ref=e1783]: ❓ "Why one machine-wide lock instead of one per slot?"
            - blockquote [ref=e1784]: "\"Per-slot locking would let two buyers vend two different slots in parallel — but on a single machine they still share ONE inserted-coins tally and ONE coin bank. So a per-slot lock wouldn't actually let them proceed independently; they'd corrupt the shared money state. The machine is the real unit of contention, so a single lock is both correct and simplest.\""
            - blockquote [ref=e1785]: ❓ "What's the deadlock risk?"
            - blockquote [ref=e1786]:
              - text: "\"Deadlock needs two locks taken in different orders. Here I only ever hold ONE lock — the machine lock — and there's no nested second lock, so there's no ordering cycle. The re-entry is the same thread re-taking the same"
              - code [ref=e1787]: RLock
              - text: ", which is safe by definition.\""
            - blockquote [ref=e1788]: ❓ "Pessimistic or optimistic — which and why?"
            - blockquote [ref=e1789]: "\"Pessimistic in-process: the critical section is tiny and there's only one machine, so grabbing a short-held lock is simpler than a retry loop. For a shared-inventory distributed case I'd flip to optimistic — a DB compare-and-set — because you can't hold a Python lock across processes.\""
            - blockquote [ref=e1790]: ❓ "What if the lock-holder crashes mid-transaction?"
            - blockquote [ref=e1791]: "\"In-process, a crash takes the whole process down, so the half-done state dies with it — no orphaned lock. In the DB version the compare-and-set is a single atomic statement, so it either committed fully or not at all.\""
            - paragraph [ref=e1792]:
