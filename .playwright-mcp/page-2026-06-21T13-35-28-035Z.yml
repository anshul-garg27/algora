              - code [ref=e1370]: "class MachineState(ABC): \"\"\"One vending-machine state. Handles the four actions, returns next state.\"\"\" name: MachineStateName @abstractmethod def insert_coin(self, ctx: \"VendingContext\", coin: Coin) -> \"MachineState\": ... @abstractmethod def select(self, ctx: \"VendingContext\", code: str) -> \"MachineState\": ... @abstractmethod def dispense(self, ctx: \"VendingContext\") -> tuple[\"MachineState\", DispenseResult]: ... @abstractmethod def cancel(self, ctx: \"VendingContext\") -> tuple[\"MachineState\", tuple[Coin, ...]]: ..."
            - paragraph [ref=e1371]:
              - code [ref=e1372]: IdleState
