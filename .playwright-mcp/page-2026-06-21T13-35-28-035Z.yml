            - generic [ref=e1374]:
              - generic [ref=e1375]:
                - generic [ref=e1376]: python
                - button "copy" [ref=e1377] [cursor=pointer]
              - code [ref=e1379]: "class IdleState(MachineState): name = MachineStateName.IDLE def insert_coin(self, ctx: VendingContext, coin: Coin) -> MachineState: ctx.inserted.append(coin) return HasMoneyState() def select(self, ctx: VendingContext, code: str) -> MachineState: _validate_selectable(ctx, code) ctx.selected_code = code return HasMoneyState() def dispense(self, ctx: VendingContext) -> tuple[MachineState, DispenseResult]: raise InvalidStateError(\"cannot dispense while idle — insert coins first\") def cancel(self, ctx: VendingContext) -> tuple[MachineState, tuple[Coin, ...]]: return self, ()"
            - blockquote [ref=e1380]: "🎙️ Say: \"Idle has no legal dispense — that's the whole point of the State pattern. You can't reach DISPENSING from IDLE, so that bug can't exist.\""
            - blockquote [ref=e1381]: ⚠️ "Why allow select before paying?" → "Real machines let you pick first. Select just validates and remembers; we still wait for money before dispensing."
            - paragraph [ref=e1382]:
              - code [ref=e1383]: HasMoneyState.dispense
              - text: "is the pipeline — re-validate everything, then vend all-or-nothing:"
            - generic [ref=e1384]:
              - generic [ref=e1385]:
                - generic [ref=e1386]: python
                - button "copy" [ref=e1387] [cursor=pointer]
              - code [ref=e1389]: "def dispense(self, ctx: VendingContext) -> tuple[MachineState, DispenseResult]: code = ctx.selected_code if code is None: raise InvalidStateError(\"no product selected — select before dispensing\") slot = _validate_selectable(ctx, code) # re-check exists + in stock price = slot.product.price_cents paid = ctx.inserted_cents() if paid < price: raise InsufficientFundsError( f\"product {code} costs {price}, only {paid} inserted\" ) # Fold the customer's coins into the bank so they're usable as change, # then ask for exact change. make_change is all-or-nothing. ctx.coin_bank.deposit_many(tuple(ctx.inserted)) change_owed = paid - price try: change = ctx.coin_bank.make_change(change_owed) except CannotMakeChangeError: _rollback_inserted(ctx) # WHY: keep money refundable on a failed sale raise slot.vend_one() # WHY: slot guards count never < 0 result = DispenseResult(product=slot.product, change=change) ctx.inserted.clear() ctx.selected_code = None return IdleState(), result"
            - blockquote [ref=e1390]:
              - strong [ref=e1391]: "Reasoning:"
              - text: This method is the moment of truth. It re-reads stock, funds, and change together because anything could have changed since
              - code [ref=e1392]: select
              - text: . The non-obvious line is
              - code [ref=e1393]: deposit_many
              - text: followed by the
              - code [ref=e1394]: _rollback_inserted
              - text: on failure — I fold the customer's coins into the bank so they can be used as change, but if change can't be formed I pull them right back out so
              - code [ref=e1395]: cancel
              - text: still refunds the customer. Notice we don't trust select-time stock —
              - code [ref=e1396]: _validate_selectable
              - text: runs again here, and
              - code [ref=e1397]: slot.vend_one()
              - text: is the actual decrement that guards the never-negative rule. The vend completes synchronously, so we return
              - code [ref=e1398]: IdleState
              - text: directly rather than parking in
              - code [ref=e1399]: DispensingState
              - text: .
            - blockquote [ref=e1400]: "🎙️ Say: \"Re-validate, deposit, make change all-or-nothing, vend, reset. The tricky bit is rolling coins back out if change fails — the customer's money stays refundable.\""
            - blockquote [ref=e1401]:
              - text: ⚠️ "What if the machine can't make change?" → "It raises
              - code [ref=e1402]: CannotMakeChangeError
              - text: ", rolls the inserted coins back out of the bank, and never vends. The customer cancels and gets their exact coins back.\""
            - paragraph [ref=e1403]:
              - code [ref=e1404]: HasMoneyState.cancel
              - text: and
