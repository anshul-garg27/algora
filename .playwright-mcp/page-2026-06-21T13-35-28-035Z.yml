                - text: It computes the full coin plan in a scratch dict and only deducts from the real inventory once it knows the exact amount can be formed. A half-deducted bank that then fails would silently lose coins.
              - listitem [ref=e688]:
                - strong [ref=e689]: Why greedy largest-first?
                - text: For the US coin set (1,5,10,25,100) greedy is optimal — each denomination divides cleanly enough that taking the biggest coin first never strands a remainder you can't fill. (For an arbitrary coin set you'd switch to a DP; see §9.)
